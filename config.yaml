# ============================================================
# 3LC Chihuahua vs Muffin - Kaggle Competition Configuration
# Data-Centric AI Hackathon (3LC x Hack4Impact-UMD)
# ============================================================

competition:
  name: "3LC Chihuahua vs Muffin"
  task: "binary_classification"
  description: "Image classifier to distinguish Chihuahua dogs from muffins using data-centric AI."

dataset:
  name: "chihuahua_muffin"
  num_classes: 2
  classes:
    chihuahua: 0
    muffin: 1

paths:
  root: "./data"
  train: "./data/train"
  val: "./data/val"
  test: "./data/test"

tlc:
  project_name: "Chihuahua-Muffin"
  dataset_name: "chihuahua-muffin"
  enable_logging: true

constraints:
  model_architecture: "resnet18"   # Fixed model architecture

training:
  epochs: 25
  batch_size: 16
  learning_rate: 0.0003
  num_workers: 2
  image_size: 224
  optimizer: "adam"
  weight_decay: 0.0001
  use_amp: true
  loss_function: "cross_entropy"

scoring:
  metric: "accuracy"
  objective: "maximize"

system:
  python_version: "3.11"
  device: "auto"      # cpu or cuda if available
  seed: 42